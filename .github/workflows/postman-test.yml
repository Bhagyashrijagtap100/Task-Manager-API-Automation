name: Postman API Automation

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main


jobs:
  api-testing:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout Repository
      uses: actions/checkout@v4


    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20


    - name: Install Newman
      run: npm install -g newman newman-reporter-htmlextra


    - name: Run Postman Collection
      run: |
        newman run "Collection/iOS Task Manager API Test.postman_collection.json" \
        -r cli,htmlextra \
        --reporter-htmlextra-export Reports/TaskManagerReport.html


    - name: Upload Test Report
      uses: actions/upload-artifact@v4
      with:
        name: Newman-Test-Report
        path: Reports
